syntax = "proto3";

package ratelimiter.v1;

option go_package = "/gen/pb";


message LimitRequest {
    string key     = 1;
    string rule_id = 2;
    int64  cost    = 3;
}

message LimitResponse {
    bool   allowed      = 1;
    int64  remaining    = 2;
    int64  limit        = 3;
    int64  reset_at_unix = 4;
}

message WatchRequest {
    string key = 1;
}

message QuotaUpdate {
    string key      = 1;
    int64  used     = 2;
    int64  remaining = 3;
    bool   exceeded = 4;
}

service RateLimiterService {
    rpc CheckLimit(LimitRequest) returns (LimitResponse);
    rpc ConsumeLimit(LimitRequest) returns (LimitResponse);
    rpc WatchQuota(WatchRequest) returns (stream QuotaUpdate);
}